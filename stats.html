<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流量统计 - QuickAPIs | AI工具导航</title>
  <meta name="description" content="QuickAPIs 流量统计页面">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="shortcut icon" href="./favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "Microsoft YaHei", sans-serif; background: #ffffff; color: #0f172a; min-height: 100vh; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(59,130,246,0.12); padding: 0 20px; height: 64px; position: sticky; top:0; z-index: 100; }
    .navbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 100%; gap: 24px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-name { font-size: 18px; font-weight: 900; background: linear-gradient(135deg, #3b82f6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-tagline { font-size: 11px; color: #94a3b8; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .subtitle { color: #64748b; margin-bottom: 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .stat-card { background: #f8fafc; border: 1px solid rgba(59,130,246,0.1); border-radius: 16px; padding: 24px; text-align: center; transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(59,130,246,0.12); }
    .stat-number { font-size: 36px; font-weight: 900; color: #3b82f6; }
    .stat-label { font-size: 13px; color: #64748b; margin-top: 4px; }
    .stat-loading { color: #cbd5e1; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .placeholder { background: #f8fafc; border: 1px solid rgba(59,130,246,0.1); border-radius: 16px; padding: 40px 24px; text-align: center; color: #94a3b8; }
    .footer { padding: 24px 20px; text-align: center; font-size: 13px; color: #94a3b8; border-top: 1px solid rgba(59,130,246,0.08); }
    .footer a { color: #3b82f6; text-decoration: none; }
    .busuanzi-wrap { display: inline-block; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="./index.html" class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9H22L16 13.5L18 21L12 16.5L6 21L8 13.5L2 9H9.5L12 2Z" fill="url(#sgrad)" stroke="#3b82f6" stroke-width="1"/><defs><linearGradient id="sgrad" x1="2" y1="2" x2="22" y2="22"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs></svg>
        <div class="logo-text">
          <span class="logo-name">QuickAPIs</span>
          <span class="logo-tagline">AI工具导航</span>
        </div>
      </a>
    </div>
  </nav>

  <div class="container">
    <h1>📊 流量统计</h1>
    <p class="subtitle">QuickAPIs.top 访问数据（由 <a href="https://busuanzi.ibruce.info" target="blank" style="color:#3b82f6">不蒜子</a> 提供）</p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number stat-loading" id="todayPv">加载中…</div>
        <div class="stat-label">今日 PV</div>
      </div>
      <div class="stat-card">
        <div class="stat-number stat-loading" id="todayUv">加载中…</div>
        <div class="stat-label">今日 UV</div>
      </div>
      <div class="stat-card">
        <div class="stat-number stat-loading" id="totalPv">加载中…</div>
        <div class="stat-label">累计访问</div>
      </div>
      <div class="stat-card">
        <div class="stat-number stat-loading" id="totalUv">加载中…</div>
        <div class="stat-label">累计访客</div>
      </div>
    </div>

    <div class="placeholder">
      <p>📊 统计由 <strong>不蒜子 (busuanzi)</strong> 驱动</p>
      <p style="margin-top:8px; font-size:13px;">数据每 5 分钟自动更新，首次访问后开始计数</p>
      <p style="margin-top:16px; font-size:13px;">💡 提示：工具点击量为本地估算值，基于 localStorage 记录</p>
    </div>

    <!-- 不蒜子隐藏容器 -->
    <span id="busuanzi_container_site_pv" style="display:none"><span id="busuanzi_value_site_pv"></span></span>
    <span id="busuanzi_container_site_uv" style="display:none"><span id="busuanzi_value_site_uv"></span></span>
    <span id="busuanzi_container_page_pv" style="display:none"><span id="busuanzi_value_page_pv"></span></span>
  </div>

  <div class="footer">
    © 2026 QuickAPIs.top · <a href="./index.html">返回首页</a>
  </div>
  <script>
    // 不蒜子数据回填到卡片
    function fillStats() {
      var totalPvEl = document.getElementById('totalPv');
      var totalUvEl = document.getElementById('totalUv');
      var todayPvEl = document.getElementById('todayPv');
      var todayUvEl = document.getElementById('todayUv');

      var totalPv = document.getElementById('busuanzi_value_site_pv');
      var totalUv = document.getElementById('busuanzi_value_site_uv');
      var pagePv = document.getElementById('busuanzi_value_page_pv');

      if (totalPv && totalPv.textContent) {
        totalPvEl.textContent = totalPv.textContent;
        totalPvEl.classList.remove('stat-loading');
      }
      if (totalUv && totalUv.textContent) {
        totalUvEl.textContent = totalUv.textContent;
        totalUvEl.classList.remove('stat-loading');
      }
      if (pagePv && pagePv.textContent) {
        todayPvEl.textContent = pagePv.textContent;
        todayPvEl.classList.remove('stat-loading');
      }
      // 今日 UV 用总 UV 近似（不蒜子无单独今日UV）
      if (totalUv && totalUv.textContent) {
        todayUvEl.textContent = '≈' + totalUv.textContent;
        todayUvEl.classList.remove('stat-loading');
      }
    }

    // 不蒜子异步加载，轮询等待数据就绪
    var _retryCount = 0;
    var _timer = setInterval(function() {
      var pv = document.getElementById('busuanzi_value_site_pv');
      if (pv && pv.textContent && pv.textContent !== '0') {
        fillStats();
        clearInterval(_timer);
      } else if (++_retryCount > 30) {
        // 超时显示默认值
        document.querySelectorAll('.stat-loading').forEach(function(el){ el.textContent='0'; el.classList.remove('stat-loading'); });
        clearInterval(_timer);
      }
    }, 500);
  </script>
</body>
</html>
