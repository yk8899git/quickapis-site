<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans SC',sans-serif;background:#faf9f7;color:#1c1917}
.navbar{background:rgba(250,249,247,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(168,162,158,.15);padding:0 20px;height:56px;position:sticky;top:0;z-index:100}
.navbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:100%;gap:20px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-size:16px;font-weight:800;background:linear-gradient(135deg,#f97316,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tagline{font-size:10px;color:#a8a29e}
.back-link{font-size:13px;color:#f97316;text-decoration:none;margin-left:auto;font-weight:500}
.container{max-width:900px;margin:0 auto;padding:28px 16px}
.tool-header{background:#fff;border-radius:18px;border:1px solid rgba(168,162,158,.15);padding:28px;margin-bottom:20px;display:flex;gap:20px;box-shadow:0 1px 3px rgba(28,25,23,.06)}
.tool-header-icon{width:68px;height:68px;border-radius:16px;background:#fff7ed;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;overflow:hidden}
.tool-header-icon img{width:42px;height:42px;border-radius:11px;object-fit:contain}
.tool-header-body{flex:1;min-width:0}
.tool-header-name{font-size:26px;font-weight:800;color:#1c1917;margin-bottom:4px}
.tool-header-desc{font-size:14px;color:#57534e;line-height:1.65;margin-bottom:10px}
.tool-header-domain{font-size:13px;color:#f97316;font-weight:500}
.tool-header-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tool-header-tag{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(249,115,22,.07);color:#ea580c;font-weight:500}
.tool-header-category{font-size:11px;padding:3px 10px;border-radius:12px;background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(244,63,94,.1));color:#e11d48;font-weight:600}
.visit-bar{background:linear-gradient(135deg,#fff7ed,#fef2f2);border:1px solid rgba(249,115,22,.12);border-radius:16px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.visit-btn{background:linear-gradient(135deg,#f97316,#f43f5e);color:white;border:none;border-radius:12px;padding:11px 30px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;box-shadow:0 2px 8px rgba(249,115,22,.25)}
.section{margin-bottom:24px}
.section-title{font-size:17px;font-weight:700;color:#1c1917;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:inline-block;width:4px;height:18px;background:linear-gradient(180deg,#f97316,#f43f5e);border-radius:2px}
.reviews-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.review-card{background:#fff;border:1px solid rgba(168,162,158,.15);border-radius:14px;padding:18px;cursor:pointer;display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(28,25,23,.04)}
.review-card:hover{background:#fffbf5;border-color:rgba(249,115,22,.3);transform:translateY(-3px)}
.review-source{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:12px;background:rgba(249,115,22,.08);color:#ea580c;margin-bottom:8px}
.review-title{font-size:14px;font-weight:600;color:#1c1917;line-height:1.55;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.review-meta{font-size:12px;color:#a8a29e;display:flex;justify-content:space-between}
.ad-section{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:18px;padding:24px;margin-bottom:24px;cursor:pointer;box-shadow:0 8px 32px rgba(102,126,234,.3)}
.ad-content{background:rgba(255,255,255,.95);border-radius:16px;padding:24px}
.ad-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.ad-icon{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.ad-title{margin:0;font-size:20px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ad-subtitle{margin:4px 0 0;font-size:13px;color:#888}
.ad-features{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.ad-feature{background:rgba(102,126,234,.08);padding:8px 14px;border-radius:20px;font-size:12px;color:#667eea;font-weight:500}
.ad-btn{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 32px;border-radius:25px;text-decoration:none;font-weight:700;box-shadow:0 4px 20px rgba(102,126,234,.4)}
.ad-footer{text-align:center;margin-top:12px;font-size:11px;color:rgba(255,255,255,.6)}
.related-tools{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.related-tool-card{background:#fff;border:1px solid rgba(168,162,158,.15);border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;text-decoration:none;color:inherit;box-shadow:0 1px 3px rgba(28,25,23,.04)}
.related-tool-card:hover{border-color:rgba(249,115,22,.35);transform:translateY(-3px)}
.related-tool-icon{width:44px;height:44px;margin:0 auto 8px;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.related-tool-icon img{width:28px;height:28px;border-radius:8px;object-fit:contain}
.related-tool-name{font-size:13px;font-weight:600;color:#1c1917}
.footer{padding:20px;text-align:center;font-size:12px;color:#a8a29e;border-top:1px solid rgba(168,162,158,.12);margin-top:40px}
.footer a{color:#f97316;text-decoration:none;font-weight:500}
@media(max-width:700px){.tool-header{flex-direction:column;align-items:center;text-align:center}.reviews-grid{grid-template-columns:1fr}.related-tools{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav class="navbar"><div class="navbar-inner">
<a href="./index.html" class="logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9H22L16 13.5L18 21L12 16.5L6 21L8 13.5L2 9H9.5L12 2Z" fill="url(#sg)" stroke="#f97316"/><defs><linearGradient id="sg" x1="2" y1="2" x2="22" y2="22"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#f43f5e"/></linearGradient></defs></svg><div class="logo-text"><span class="logo-name">QuickAPIs</span><span class="logo-tagline">AI工具导航</span></div></a>
<a href="./index.html" class="back-link">&larr; 返回首页</a>
</div></nav>

<div class="container">

<div class="tool-header" id="toolHeader">
<div class="tool-header-icon" id="toolIcon">&#x1F916;</div>
<div class="tool-header-body">
<div class="tool-header-name" id="toolName">加载中...</div>
<div class="tool-header-desc" id="toolDesc"></div>
<div class="tool-header-domain" id="toolDomain"></div>
<div class="tool-header-tags" id="toolTags"></div>
<div style="margin-top:10px;" id="toolCategory"></div>
</div></div>

<div class="visit-bar">
<span class="visit-label">&#x1F310; 访问官方主站获取最新信息</span>
<a href="#" class="visit-btn" id="visitBtn" target="_blank">立即访问 &rarr;</a>
</div>

<!-- 2233.ai 广告位 -->
<div class="ad-section" onclick="window.open('https://2233.ai/i/F9VX375O','_blank')">
<div class="ad-content">
<div class="ad-header"><div class="ad-icon">&#x1F916;</div><div>
<h3 class="ad-title">2233.ai — 半价用上 GPT-4 &amp; Claude</h3>
<p class="ad-subtitle">API中转平台 · ChatGPT Plus / Claude Pro 低至五折</p>
</div></div>
<div class="ad-features">
<span class="ad-feature">&#x2728; GPT-4 半价</span><span class="ad-feature">&#x1F525; Claude Pro 五折</span><span class="ad-feature">&#x1F4B0; 邀请奖励 /人</span>
</div>
<div style="text-align:center;">
<a href="https://2233.ai/i/F9VX375O" target="_blank" class="ad-btn" onclick="event.stopPropagation();">&#x1F680; 立即注册领取优惠 &rarr;</a>
</div></div>
<p class="ad-footer">广告位 · 联系 submit@quickapis.top 投放</p>
</div>

<!-- 相关评测（重要！） -->
<div class="section" id="reviewsSection" style="display:none;">
<div class="section-title">&#x1F4F0; 相关评测链接</div>
<div class="reviews-grid" id="reviewsGrid"></div>
</div>

<!-- 更多工具推荐 -->
<div class="section" id="relatedSection" style="display:none;">
<div class="section-title">&#x1F50D; 更多工具推荐</div>

<div class="footer">&copy; 2026 QuickAPIs.top &middot; <a href="./index.html">返回首页</a> &middot; <a href="./stats.html">统计</a></div>

<script>
function getParam(n){return new URLSearchParams(window.location.search).get(n)}

function extractDomain(url){
  if(!url)return '';
  try{return new URL(url).hostname.replace(/^www\./,'')}
  catch(e){return url.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0]}
}

var tid=getParam('id');
if(!tid){
  document.getElementById('toolName').textContent='\u274C 缺少参数';
  document.getElementById('toolDesc').textContent='请从首页点击工具卡片进入此页面';
}

fetch('./tools.json')
.then(function(r){return r.json()})
.then(function(data){
  var tools=data.tools||[],tool=null;
  for(var i=0;i<tools.length;i++){if(tools[i].id==tid||tools[i].name===tid){tool=tools[i];break}}
  if(!tool){
    document.getElementById('toolName').textContent='未找到该工具';
    document.getElementById('toolDesc').textContent='工具可能已被移除或ID不正确';
    return;
  }
  var domain=extractDomain(tool.url);
  document.title=tool.name+' - QuickAPIs | AI工具导航';
  document.getElementById('toolName').textContent=tool.nameCn||tool.name;
  document.getElementById('toolDesc').textContent=tool.description||'';
  document.getElementById('toolDomain').innerHTML='<span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;border-radius:50%;background:#22c55e;"></span>'+(domain||'')+'</span>';
  var iconEl=document.getElementById('toolIcon');
  iconEl.innerHTML='<img src="https://icons.duckduckgo.com/ip3/'+domain+'.ico" alt="'+tool.name+'" onerror="this.parentNode.innerHTML=\'&#x1F916;\'">';
  var tagsEl=document.getElementById('toolTags');
  if(tool.tags&&tool.tags.length>0){tagsEl.innerHTML=tool.tags.map(function(t){return '<span class="tool-header-tag">'+t+'</span>'}).join('')}
  if(tool.category){document.getElementById('toolCategory').innerHTML='<span class="tool-header-category">'+tool.category+'</span>'}
  document.getElementById('visitBtn').href=tool.url;

  // 相关评测链接
  var reviews=tool.reviews||[];
  if(reviews.length>0){
    document.getElementById('reviewsSection').style.display='block';
    document.getElementById('reviewsGrid').innerHTML=reviews.map(function(r){
      return '<div class="review-card" onclick="window.open(\''+r.url+'\',\'_blank\')">'+
        '<span class="review-source">'+(r.source||'\u8BC4\u6D4B')+'</span>'+
        '<div class="review-title">'+r.title+'</div>'+
        '<div class="review-meta"><span>'+(r.time||'')+'</span><span>\u70B9\u51FB\u9605\u8BFB &rarr;</span></div>'+
      '</div>';
    }).join('');
  }

  var sameCat=tools.filter(function(t){return t.category===tool.category&&t.id!==tool.id});
  if(sameCat.length>0){
    document.getElementById('relatedSection').style.display='block';
    document.getElementById('relatedTools').innerHTML=sameCat.slice(0,8).map(function(t){
      var rd=extractDomain(t.url);
      return '<a href="tool-detail.html?id='+t.id+'" class="related-tool-card"><div class="related-tool-icon">'+(rd?'<img src="https://icons.duckduckgo.com/ip3/'+rd+'.ico" alt="'+t.name+'">':'')+'</div><div class="related-tool-name">'+(t.nameCn||t.name)+'</div></a>';
    }).join('');
  }
})
.catch(function(err){
  console.error('\u52A0\u8F7D\u5931\u8D25:',err);
  document.getElementById('toolDesc').textContent='\u6570\u636E\u52A0\u8F7D\u5931\u8D25';
});
</script>
</body>
</html>
