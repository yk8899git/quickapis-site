<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品详情 - QuickAPIs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --sw-accent:#f97316;--sw-accent2:#f43f5e;
  --hw-accent:#10b981;--hw-accent2:#06b6d4;
  --bg:#faf9f7;--card:#fff;--border:rgba(0,0,0,.07);--text:#1c1917;--muted:#78716c;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
a{color:var(--sw-accent);text-decoration:none}

/* Nav */
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;height:52px}
.nav-back{font-size:14px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none}
.nav-back:hover{color:var(--text)}

/* Banner */
.banner{position:relative;background:linear-gradient(135deg,#1e293b,#334155);min-height:260px;overflow:hidden}
.banner img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.banner-fallback{position:absolute;inset:0;background:linear-gradient(135deg,var(--sw-accent),var(--sw-accent2))}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 60%);z-index:1}
.banner-content{position:relative;z-index:2;padding:40px 24px 24px;max-width:900px;margin:0 auto;color:#fff}
.banner-tag{display:inline-block;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:10px}
.sw-tag{background:var(--sw-accent)}.hw-tag{background:var(--hw-accent)}
.banner-title{font-size:28px;font-weight:800;margin-bottom:6px}
.banner-sub{font-size:15px;opacity:.85}

/* Content */
.content{max-width:900px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 300px;gap:24px}

.main-col{}
.side-col{}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.desc-text{font-size:14px;line-height:1.75;color:var(--text)}

.spec-row{display:flex;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.spec-row:last-child{border:none}
.spec-key{color:var(--muted);width:100px;flex-shrink:0}
.spec-val{font-weight:600}

.pros-list,.cons-list{list:none;padding:0}
.pros-list li,.cons-list li{padding:8px 0;font-size:13px;line-height:1.5;border-bottom:1px solid var(--border)}
.pros-list li:last-child,.cons-list li:last-child{border:none}
.pros-list li::before{content:'✅ ';margin-right:4px}
.cons-list li::before{content:'⚠️ ';margin-right:4px}

.visit-btn{display:block;width:100%;padding:12px;border-radius:11px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;text-decoration:none;transition:.2s;margin-top:8px}
.visit-btn.sw{background:linear-gradient(135deg,var(--sw-accent),var(--sw-accent2));color:#fff}
.visit-btn.hw{background:linear-gradient(135deg,var(--hw-accent),var(--hw-accent2));color:#fff}
.visit-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.15)}

.tag-chip{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin:2px 4px 2px 0;background:#f0ede8;color:var(--muted)}

.related-card{display:flex;gap:12px;padding:12px;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid transparent}
.related-card:hover{background:#fef9f0;border-color:var(--sw-accent)}
.related-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:linear-gradient(135deg,var(--sw-accent),var(--sw-accent2));color:#fff}
.related-name{font-size:13px;font-weight:700;margin-bottom:2px}
.related-cat{font-size:11px;color:var(--muted)}

.not-found{text-align:center;padding:80px 24px}
.not-found h2{margin-bottom:10px}
.not-found p{color:var(--muted)}

@media(max-width:720px){
  .content{grid-template-columns:1fr}
  .banner-title{font-size:22px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-back" href="/">← 返回首页</a>
  </div>
</nav>

<div class="banner" id="banner">
  <div class="banner-overlay"></div>
  <div class="banner-content" id="bannerContent"></div>
</div>

<div class="content" id="contentArea">
  <div class="not-found" id="notFound" style="display:none">
    <h2>😕 产品未找到</h2>
    <p>该产品不存在或已被移除</p>
    <br><a href="/" style="font-size:15px">← 返回首页</a>
  </div>

  <div class="main-col" id="mainCol" style="display:none">
    <div class="card">
      <div class="card-title">📋 产品介绍</div>
      <div class="desc-text" id="descText"></div>
    </div>
    <div class="card" id="specsCard" style="display:none">
      <div class="card-title">⚙️ 规格参数</div>
      <div id="specsBody"></div>
    </div>
    <div class="card" id="featuresCard" style="display:none">
      <div class="card-title">✨ 核心特点</div>
      <div id="featuresBody"></div>
    </div>
    <div class="card" id="prosCard" style="display:none">
      <div class="card-title">👍 优势</div>
      <ul class="pros-list" id="prosList"></ul>
    </div>
    <div class="card" id="consCard" style="display:none">
      <div class="card-title">⚠️ 注意事项</div>
      <ul class="cons-list" id="consList"></ul>
    </div>
  </div>

  <div class="side-col" id="sideCol" style="display:none">
    <div class="card">
      <div class="card-title">🔗 访问官网</div>
      <a class="visit-btn sw" id="visitBtn" target="_blank" rel="noopener">访问官网 →</a>
    </div>
    <div class="card" id="pricingCard" style="display:none">
      <div class="card-title">💰 价格信息</div>
      <div id="pricingBody" class="desc-text"></div>
    </div>
    <div class="card" id="tagsCard" style="display:none">
      <div class="card-title">🏷️ 标签</div>
      <div id="tagsBody"></div>
    </div>
    <div class="card" id="relatedCard" style="display:none">
      <div class="card-title">🔗 相关推荐</div>
      <div id="relatedBody"></div>
    </div>
  </div>
</div>

<script>
async function loadDetail() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  try {
    const r = await fetch('./tools.json?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    let raw = await r.text();
    if (raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
    const d = JSON.parse(raw);
    const tools = d.tools || [];
    const tool = tools.find(function(t) { return t.id === id; });

    if (!tool) {
      document.getElementById('notFound').style.display = 'block';
      document.getElementById('mainCol').style.display = 'none';
      document.getElementById('sideCol').style.display = 'none';
      document.title = '未找到 - QuickAPIs';
      return;
    }

    renderDetail(tool, tools);

  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('notFound').style.display = 'block';
  }
}

function renderDetail(tool, allTools) {
  const isHW = ['智能家居','人形机器人','扫地机器人','AI眼镜','智能音箱','AI学习机','无人机','翻译录音','智能摄像','服务机器人','工业机器人','AI健康穿戴'].indexOf(tool.category) !== -1;

  // Title
  document.title = (tool.nameCn || tool.name) + ' - QuickAPIs';

  // Banner
  const bannerEl = document.getElementById('banner');
  const bannerContent = document.getElementById('bannerContent');
  const tagClass = isHW ? 'hw-tag' : 'sw-tag';
  const tagLabel = isHW ? 'AI硬件' : 'AI工具';

  let bannerHtml = '';
  if (tool.bannerImage) {
    bannerHtml = '<img src="'+esc(tool.bannerImage)+'" alt="'+esc(tool.nameCn||tool.name)+'" onerror="this.style.display=\'none\'">';
  }
  bannerHtml += '<div class="banner-fallback"></div>';

  bannerContent.innerHTML =
    '<span class="banner-tag '+tagClass+'">'+tagLabel+'</span>' +
    '<div class="banner-title">'+esc(tool.nameCn||tool.name)+'</div>' +
    '<div class="banner-sub">'+esc(tool.category) + (tool.description ? ' · ' + esc(tool.description.substring(0,80)) : '') + '</div>';

  // Show columns
  document.getElementById('mainCol').style.display = 'block';
  document.getElementById('sideCol').style.display = 'block';

  // Description
  var desc = tool.description || '';
  if (!desc && tool.features && tool.features.length) {
    desc = tool.features.join('；');
  }
  document.getElementById('descText').textContent = desc || '暂无详细介绍。';

  // Specs
  if (tool.specs && Object.keys(tool.specs).length > 0) {
    var specsHtml = '';
    for (var k in tool.specs) {
      specsHtml += '<div class="spec-row"><span class="spec-key">'+esc(k)+'</span><span class="spec-val">'+esc(String(tool.specs[k]))+'</span></div>';
    }
    document.getElementById('specsBody').innerHTML = specsHtml;
    document.getElementById('specsCard').style.display = 'block';
  }

  // Features
  if (tool.features && tool.features.length > 0) {
    document.getElementById('featuresBody').innerHTML = '<ul style="padding-left:18px"><li>' + tool.features.map(esc).join('</li><li>') + '</li></ul>';
    document.getElementById('featuresCard').style.display = 'block';
  }

  // Pros
  if (tool.pros && tool.pros.length > 0) {
    document.getElementById('prosList').innerHTML = tool.pros.map(function(p){return'<li>'+esc(p)+'</li>';}).join('');
    document.getElementById('prosCard').style.display = 'block';
  }

  // Cons
  if (tool.cons && tool.cons.length > 0) {
    document.getElementById('consList').innerHTML = tool.cons.map(function(c){return'<li>'+esc(c)+'</li>';}).join('');
    document.getElementById('consCard').style.display = 'block';
  }

  // Visit button
  const link = tool.url || tool.website || tool.link || '#';
  const visitBtn = document.getElementById('visitBtn');
  visitBtn.href = link;
  visitBtn.textContent = '访问 ' + (extractDomain(link)) + ' →';
  visitBtn.className = 'visit-btn ' + (isHW ? 'hw' : 'sw');

  // Pricing
  if (tool.pricing && Object.keys(tool.pricing).length > 0) {
    var pricingHtml = '';
    for (var pk in tool.pricing) {
      pricingHtml += '<div class="spec-row"><span class="spec-key">'+esc(pk)+'</span><span class="spec-val">'+esc(String(tool.pricing[pk]))+'</span></div>';
    }
    document.getElementById('pricingBody').innerHTML = pricingHtml;
    document.getElementById('pricingCard').style.display = 'block';
  }

  // Tags
  if (tool.tags && tool.tags.length > 0) {
    document.getElementById('tagsBody').innerHTML = tool.tags.map(function(t){return'<span class="tag-chip">'+esc(t)+'</span>';}).join('');
    document.getElementById('tagsCard').style.display = 'block';
  }

  // Related: same category, max 5
  var related = allTools.filter(function(t){ return t.category === tool.category && t.id !== tool.id; }).slice(0, 5);
  if (related.length > 0) {
    var relatedHtml = '';
    related.forEach(function(r) {
      var rLink = r.url || r.website || r.link || '#';
      relatedHtml += '<a class="related-card" href="tool-detail.html?id='+esc(r.id)+'">';
      relatedHtml +=   '<div class="related-icon">'+esc(r.icon||'◈')+'</div>';
      relatedHtml +=   '<div><div class="related-name">'+esc(r.nameCn||r.name)+'</div>';
      relatedHtml +=   '<div class="related-cat">'+esc(r.category)+'</div></div></a>';
    });
    document.getElementById('relatedBody').innerHTML = relatedHtml;
    document.getElementById('relatedCard').style.display = 'block';
  }
}

function extractDomain(url) {
  if (!url || url === '#') return '官网';
  try {
    var u = new URL(url);
    return u.hostname.replace(/^www\./,'');
  } catch(e) { return url; }
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

loadDetail();
</script>
<footer class="footer">
  <div class="footer-logo">QuickAPIs</div>
  <div class="footer-copy">&copy; 2026 QuickAPIs.top &middot; <a href="index.html" style="color:inherit">返回首页</a> <span id="busuanzi_container_site_pv" style="display:inline"><span id="busuanzi_value_site_pv">--</span> 次访问</span></div>
</footer>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
