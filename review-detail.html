<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评测详情 - QuickAPIs | AI工具导航</title>
  <meta name="description" content="QuickAPIs AI工具评测详情">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "Microsoft YaHei", sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; }

    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(59,130,246,0.12); padding: 0 20px; height: 56px; position: sticky; top:0; z-index: 100; }
    .navbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 100%; gap: 20px; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-name { font-size: 16px; font-weight: 900; background: linear-gradient(135deg, #3b82f6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-tagline { font-size: 10px; color: #94a3b8; }
    .back-link { font-size: 13px; color: #3b82f6; text-decoration: none; margin-left: auto; }
    .back-link:hover { text-decoration: underline; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* 页面标题 */
    .page-header { text-align: center; margin-bottom: 28px; }
    .page-title { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: #94a3b8; }

    /* 工具网格：一排4个小卡片 */
    .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }

    .tool-card {
      background: #fff;
      border: 1px solid rgba(59,130,246,0.10);
      border-radius: 12px;
      padding: 14px;
      transition: all 0.25s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .tool-card:hover {
      border-color: rgba(59,130,246,0.35);
      box-shadow: 0 6px 20px rgba(59,130,246,0.10);
      transform: translateY(-2px);
    }
    .tool-card.active {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
      background: linear-gradient(135deg, #eff6ff, #fdf2f8);
    }

    .tool-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .tool-card-icon { font-size: 22px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(59,130,246,0.08); border-radius: 8px; }
    .tool-card-name { font-size: 14px; font-weight: 700; color: #1e293b; }
    .tool-card-desc { font-size: 11px; color: #64748b; line-height: 1.5; margin-bottom: 8px; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tool-card-url { font-size: 11px; color: #3b82f6; word-break: break-all; opacity: 0.7; }
    .tool-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tool-card-tag { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: rgba(59,130,246,0.07); color: #3b82f6; white-space: nowrap; }

    /* 评测链接区 */
    .reviews-section { margin-top: 8px; }
    .section-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; display: inline-block; width: 3px; height: 16px; background: linear-gradient(135deg, #3b82f6, #ec4899); border-radius: 2px; }
    .section-tool-name { font-size: 13px; color: #3b82f6; font-weight: 600; }

    .reviews-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .review-item {
      background: #fff;
      border: 1px solid rgba(59,130,246,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      transition: all 0.2s;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .review-item:hover { background: #eff6ff; border-color: rgba(59,130,246,0.25); transform: translateX(3px); box-shadow: 0 4px 12px rgba(59,130,246,0.08); }
    .review-source-badge { background: rgba(59,130,246,0.1); color: #3b82f6; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
    .review-item-body { flex: 1; min-width: 0; }
    .review-item-title { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 2px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .review-item-meta { font-size: 11px; color: #94a3b8; }
    .review-arrow { color: #c0c8d4; font-size: 14px; flex-shrink: 0; margin-top: 2px; }

    .empty-state { text-align: center; padding: 30px 16px; color: #94a3b8; font-size: 13px; grid-column: 1 / -1; }

    .footer { padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid rgba(59,130,246,0.06); margin-top: 40px; }
    .footer a { color: #3b82f6; text-decoration: none; }

    /* 响应式 */
    @media (max-width: 900px) {
      .tools-grid { grid-template-columns: repeat(3, 1fr); }
      .reviews-list { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .tool-card { padding: 10px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="./index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9H22L16 13.5L18 21L12 16.5L6 21L8 13.5L2 9H9.5L12 2Z" fill="url(#sgrad)" stroke="#3b82f6" stroke-width="1"/><defs><linearGradient id="sgrad" x1="2" y1="2" x2="22" y2="22"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs></svg>
        <div class="logo-text">
          <span class="logo-name">QuickAPIs</span>
          <span class="logo-tagline">AI工具导航</span>
        </div>
      </a>
      <a href="./index.html" class="back-link">← 返回首页</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="page-title">📰 热门评测</div>
      <div class="page-subtitle">点击上方工具卡片查看对应评测链接</div>
    </div>

    <!-- 工具网格：一排4个 -->
    <div class="tools-grid" id="toolsGrid"></div>

    <!-- 评测链接列表 -->
    <div class="reviews-section" id="reviewsSection" style="display:none;">
      <div class="section-title">
        相关评测 · <span class="section-tool-name" id="activeToolName"></span>
      </div>
      <div class="reviews-list" id="reviewsList"></div>
    </div>
  </div>

  <div class="footer">
    © 2026 QuickAPIs.top · <a href="./index.html">返回首页</a> · <a href="./stats.html">统计</a>
  </div>

  <script>
    // 评测数据
    var REVIEWS_DATA = [
      { tool: "Kimi", toolIcon: "🦙", title: "Kimi 2.0 深度评测：长文本处理的新标杆", url: "https://zhuanlan.zhihu.com/p/688493103", source: "知乎", time: "2026-04-28" },
      { tool: "Kimi", toolIcon: "🦙", title: "Kimi vs ChatGPT：谁更适合处理长文档？", url: "https://www.bilibili.com/video/BV1xx411c7mD", source: "B站", time: "2026-04-25" },
      { tool: "ChatGPT", toolIcon: "🤖", title: "ChatGPT 4o 实测：免费版够用吗？完全评测", url: "https://www.youtube.com/watch?v=8PtXYW1zGJY", source: "YouTube", time: "2026-04-27" },
      { tool: "ChatGPT", toolIcon: "🤖", title: "ChatGPT记忆功能上线，AI助手终于能记住你了", url: "https://www.ifanr.com/1526843", source: "爱范儿", time: "2026-04-26" },
      { tool: "DeepSeek", toolIcon: "🔍", title: "DeepSeek-V3 测评：开源模型的性能天花板", url: "https://zhuanlan.zhihu.com/p/687321456", source: "知乎", time: "2026-04-24" },
      { tool: "DeepSeek", toolIcon: "🔍", title: "DeepSeek R1 本地部署全记录，4090显卡实测", url: "https://www.bilibili.com/video/BV1gh411x7mR", source: "B站", time: "2026-04-22" },
      { tool: "Claude", toolIcon: "🧠", title: "Claude 4 Sonnet 评测：代码能力封神？", url: "https://www.youtube.com/watch?v=xR8pH1q2bP4", source: "YouTube", time: "2026-04-23" },
      { tool: "Claude", toolIcon: "🧠", title: "Claude Projects 功能详解：AI助手如何管理你的知识库", url: "https://www.woshipm.com/evaluating/5987456.html", source: "人人都是产品经理", time: "2026-04-21" },
      { tool: "Midjourney", toolIcon: "🎨", title: "Midjourney V7 测试：画质提升明显，但值得升级吗？", url: "https://www.bilibili.com/video/BV1jk411x7mQ", source: "B站", time: "2026-04-20" },
      { tool: "Cursor", toolIcon: "💻", title: "Cursor 编辑器完全指南：AI写代码是什么体验？", url: "https://zhuanlan.zhihu.com/p/685234987", source: "知乎", time: "2026-04-19" },
      { tool: "Cursor", toolIcon: "💻", title: "实测 Cursor vs Copilot：哪个AI编程助手更强？", url: "https://www.bilibili.com/video/BV1gh411x7mR", source: "B站", time: "2026-04-18" },
      { tool: "Notion AI", toolIcon: "📝", title: "Notion AI 深度使用3个月：值不值得买？", url: "https://www.xiaohongshu.com/explore/661a3c20000000001a01d2e4", source: "小红书", time: "2026-04-17" },
    ];

    // 从评测数据中提取唯一工具
    function getUniqueTools() {
      var map = {};
      REVIEWS_DATA.forEach(function(r) {
        if (!map[r.tool]) {
          map[r.tool] = { name: r.tool, icon: r.toolIcon };
        }
      });
      return Object.values(map);
    }

    // 获取某个工具的评测
    function getReviewsForTool(toolName) {
      return REVIEWS_DATA.filter(function(r) { return r.tool === toolName; });
    }

    // 渲染工具网格（一排4个小卡片）
    var toolsGrid = document.getElementById('toolsGrid');
    var uniqueTools = getUniqueTools();

    // 先从 URL 参数获取高亮的工具
    var highlightTool = null;
    var params = new URLSearchParams(window.location.search);
    if (params.get('tool')) highlightTool = decodeURIComponent(params.get('tool'));

    uniqueTools.forEach(function(t) {
      var card = document.createElement('div');
      card.className = 'tool-card' + (t.name === highlightTool ? ' active' : '');
      card.setAttribute('data-tool', t.name);

      var reviews = getReviewsForTool(t.name);
      var reviewCount = reviews.length;

      card.innerHTML =
        '<div class="tool-card-top">' +
          '<div class="tool-card-icon">' + t.icon + '</div>' +
          '<div class="tool-card-name">' + t.name + '</div>' +
        '</div>' +
        '<div class="tool-card-desc">共 ' + reviewCount + ' 条相关评测，点击查看详情</div>' +
        '<div class="tool-card-reviews">';

      reviews.forEach(function(r) {
        card.innerHTML += '<div style="font-size:10px;color:#94a3b8;margin-top:3px;">📰 ' + r.source + ' · ' + r.title.substring(0, 18) + '...</div>';
      });

      card.innerHTML += '</div>';

      card.onclick = function() {
        // 高亮当前卡片
        document.querySelectorAll('.tool-card').forEach(function(c) { c.classList.remove('active'); });
        card.classList.add('active');

        // 显示评测列表
        showReviews(t.name);
      };

      toolsGrid.appendChild(card);
    });

    // 显示评测链接
    function showReviews(toolName) {
      var section = document.getElementById('reviewsSection');
      var listEl = document.getElementById('reviewsList');
      var nameEl = document.getElementById('activeToolName');

      nameEl.textContent = toolName;
      section.style.display = 'block';

      var reviews = getReviewsForTool(toolName);
      listEl.innerHTML = '';

      if (reviews.length === 0) {
        listEl.innerHTML = '<div class="empty-state">暂无相关评测</div>';
        return;
      }

      reviews.forEach(function(r) {
        var item = document.createElement('div');
        item.className = 'review-item';
        item.onclick = function(e) { e.stopPropagation(); window.open(r.url, '_blank'); };
        item.innerHTML =
          '<span class="review-source-badge">' + r.source + '</span>' +
          '<div class="review-item-body">' +
            '<div class="review-item-title">' + r.title + '</div>' +
            '<div class="review-item-meta">' + r.time + ' · 点击跳转原文 →</div>' +
          '</div>' +
          '<span class="review-arrow">→</span>';
        listEl.appendChild(item);
      });

      // 滚动到评测区域
      section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 如果有URL参数，自动展开该工具的评测
    if (highlightTool) {
      showReviews(highlightTool);
    } else if (uniqueTools.length > 0) {
      // 默认展开第一个
      showReviews(uniqueTools[0].name);
      var firstCard = document.querySelector('.tool-card[data-tool="' + uniqueTools[0].name + '"]');
      if (firstCard) firstCard.classList.add('active');
    }
  </script>
</body>
</html>
