<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickAPIs - AI工具导航 | 发现全球优质AI工具</title>
  <meta name="google-site-verification" content="WutduuXwKXg6Bvwvzgund-UMnxwhBSn9GQVC0ukQu2U" />
  <meta name="description" content="QuickAPIs收录225+精选AI应用，覆盖ChatGPT、Midjourney、Claude、Gemini等主流工具。">
  <link rel="canonical" href="https://quickapis.top/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --accent:#f97316;--accent2:#f43f5e;--bg:#faf9f7;
      --card:#fff;--border:rgba(0,0,0,0.07);--text:#1c1917;--muted:#78716c;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    input{font-family:inherit}
    #starfield,canvas{display:none!important}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:12px;min-height:64px}
    .nav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;
      background:linear-gradient(135deg,#f97316,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0}
    .nav-logo svg{width:24px;height:24px;flex-shrink:0}
    .nav-cats{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;padding:4px 0}
    .nav-cats::-webkit-scrollbar{display:none}
    .nav-cat{padding:6px 14px;border-radius:100px;font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:all .15s;border:1px solid transparent}
    .nav-cat:hover{color:var(--text);background:#f5f3f0}
    .nav-cat.active{color:#fff;background:linear-gradient(135deg,#f97316,#f43f5e);box-shadow:0 2px 10px rgba(249,115,22,.3)}
    .nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .nav-count{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:13px;font-weight:600;
      background:linear-gradient(135deg,rgba(249,115,22,.08),rgba(244,63,94,.06));border:1px solid rgba(249,115,22,.2);color:var(--accent)}
    .nav-count .n{font-size:15px;font-weight:800}
    .nav-search{display:flex;align-items:center;gap:6px;background:#f5f3f0;border:1px solid var(--border);border-radius:100px;padding:7px 14px;width:180px;transition:all .15s}
    .nav-search:focus-within{border-color:rgba(249,115,22,.4);box-shadow:0 0 0 3px rgba(249,115,22,.06);background:#fff}
    .nav-search input{background:none;border:none;outline:none;font-size:13px;color:var(--text);width:100%}
    .nav-search input::placeholder{color:var(--muted)}

    /* MAIN */
    .main-wrap{max-width:1400px;margin:0 auto;padding:24px}

    /* SPLIT LAYOUT */
    .split{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
    @media(max-width:900px){.split{grid-template-columns:1fr}}

    /* SLIDER */
    .slider-wrap{position:relative;border-radius:20px;overflow:hidden;background:#111;aspect-ratio:16/9;max-height:480px}
    .slider-track{display:flex;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1)}
    .slide{min-width:100%;height:100%;position:relative;display:flex;align-items:flex-end}
    .slide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.05) 100%)}
    .slide-content{position:relative;z-index:2;padding:36px 32px;color:#fff;width:100%}
    .slide-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(249,115,22,.85);padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;margin-bottom:14px;backdrop-filter:blur(8px)}
    .slide-title{font-size:clamp(18px,2.5vw,26px);font-weight:800;line-height:1.3;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .slide-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:rgba(255,255,255,.7)}
    .slide-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.5)}
    .slide-link-btn{display:inline-flex;align-items:center;gap:4px;margin-top:14px;padding:8px 18px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:100px;font-size:13px;font-weight:600;color:#fff;backdrop-filter:blur(8px);transition:all .2s;cursor:pointer}
    .slide-link-btn:hover{background:rgba(249,115,22,.85);border-color:rgba(249,115,22,.5);transform:translateX(3px)}
    .s-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
    .s-arrow:hover{background:rgba(249,115,22,.8);border-color:transparent}
    .s-arrow.prev{left:14px}.s-arrow.next{right:14px}
    .slider-dots{position:absolute;bottom:14px;right:20px;display:flex;gap:6px;z-index:10}
    .s-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .3s}
    .s-dot.active{background:#fff;width:18px;border-radius:3px}

    /* RIGHT PANEL */
    .right-panel{display:flex;flex-direction:column;gap:6px}
    .rp-title{font-size:12px;font-weight:700;color:var(--muted);padding:0 2px 6px;letter-spacing:.5px;text-transform:uppercase}
    .mini-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative}
    .mini-card:hover{background:#fffbf5;border-color:rgba(249,115,22,.25);transform:translateX(3px);box-shadow:0 4px 16px rgba(249,115,22,.08)}
    .mini-card:hover .mini-tip{display:block}
    .mini-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#f97316,#f43f5e);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
    .mini-icon img{width:24px;height:24px;object-fit:contain}
    .mini-info{flex:1;min-width:0}
    .mini-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
    .mini-cat{font-size:11px;color:var(--muted)}
    .mini-arrow{font-size:14px;color:var(--muted);flex-shrink:0;transition:transform .2s}
    .mini-card:hover .mini-arrow{transform:translateX(3px);color:var(--accent)}
    .mini-tip{display:none;position:absolute;left:0;right:0;bottom:100%;background:rgba(15,15,15,.92);color:#fff;padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.5;z-index:20;margin-bottom:4px;backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
    .mini-tip::after{content:'';position:absolute;top:100%;left:18px;border:6px solid transparent;border-top-color:rgba(15,15,15,.92)}

    /* FOOTER */
    .footer{border-top:1px solid var(--border);padding:32px 0;margin-top:32px}
    .footer-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .footer-logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#f97316,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .footer-links{display:flex;align-items:center;gap:16px}
    .footer-link{font-size:13px;color:var(--muted);transition:color .15s}
    .footer-link:hover{color:var(--accent)}
    .footer-copy{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
    @media(max-width:768px){.nav-search{display:none}.nav-cats::-webkit-scrollbar{display:none}}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="#" class="nav-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9H22L16 13.5L18 21L12 16.5L6 21L8 13.5L2 9H9.5L12 2Z" fill="url(#sg)"/><defs><linearGradient id="sg" x1="2" y1="2" x2="22" y2="22"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#f43f5e"/></linearGradient></defs></svg>
      QuickAPIs
    </a>
    <div class="nav-cats" id="navCats">
      <button class="nav-cat active" data-cat="all">全部</button>
      <button class="nav-cat" data-cat="chat">聊天AI</button>
      <button class="nav-cat" data-cat="image">图像生成</button>
      <button class="nav-cat" data-cat="code">代码助手</button>
      <button class="nav-cat" data-cat="video">视频制作</button>
      <button class="nav-cat" data-cat="audio">音频工具</button>
      <button class="nav-cat" data-cat="office">办公效率</button>
      <button class="nav-cat" data-cat="search">搜索研究</button>
      <button class="nav-cat" data-cat="3d">3D建模</button>
      <button class="nav-cat" data-cat="design">设计工具</button>
      <button class="nav-cat" data-cat="writing">写作助手</button>
      <button class="nav-cat" data-cat="api">大模型API</button>
      <button class="nav-cat" data-cat="dev">开发者</button>
      <button class="nav-cat" data-cat="education">教育学习</button>
      <button class="nav-cat" data-cat="other">其他</button>
    </div>
    <div class="nav-right">
      <div class="nav-search">
        <span style="font-size:13px;opacity:.5">🔍</span>
        <input type="text" id="navSearch" placeholder="搜索工具...">
      </div>
      <div class="nav-count">📡 <span class="n" id="toolNum">229</span> 收录工具</div>
    </div>
  </div>
</nav>

<main class="main-wrap">
  <div class="split">
    <div class="slider-wrap" id="sliderWrap">
      <div class="slider-track" id="sTrack"></div>
      <button class="s-arrow prev" id="sPrev">‹</button>
      <button class="s-arrow next" id="sNext">›</button>
      <div class="slider-dots" id="sDots"></div>
    </div>
    <div class="right-panel" id="rPanel">
      <div class="rp-title">🔥 推荐工具</div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">QuickAPIs</div>
    <div class="footer-links">
      <a href="submit.html" class="footer-link">📝 提交工具</a>
      <a href="stats.html" class="footer-link">📊 流量统计</a>
      <a href="about.html" class="footer-link">关于</a>
    </div>
  </div>
  <div class="footer-inner" style="justify-content:center">
    <div class="footer-copy">© 2026 QuickAPIs.top · 仅供导航学习</div>
  </div>
</footer>

<script>
const SLIDES=[
  {tool:"ChatGPT",img:"https://images.unsplash.com/photo-1677442136019-21780ecad995?w=1200&q=80",tag:"🤖 ChatGPT",title:"ChatGPT全面测评：GPT-4o能力边界实测，编程写作双杀Claude",source:"CSDN",time:"2026-05-11"},
  {tool:"Claude",img:"https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1200&q=80",tag:"🧠 Claude",title:"Claude Opus 4.7深度评测：代码工程能力跃升64%，与GPT-5全面对标",source:"CSDN",time:"2026-05-11"},
  {tool:"Gemini",img:"https://images.unsplash.com/photo-1676277791608-ac54585e6876?w=1200&q=80",tag:"✨ Gemini",title:"被忽视的Gemini：2026最被低估的全能AI神器，多模态能力实测",source:"CSDN",time:"2026-05-12"},
  {tool:"DeepSeek",img:"https://images.unsplash.com/photo-1676928002140-4c6b0e47bb18?w=1200&q=80",tag:"🔍 DeepSeek",title:"DeepSeek-V4深度评测：参数解析与实战边界，国产大模型黑马",source:"CSDN",time:"2026-05-09"},
  {tool:"Kimi",img:"https://images.unsplash.com/photo-1655720828018-edd2daec9349?w=1200&q=80",tag:"🌙 Kimi",title:"Kimi K2.6长上下文实测：200万字文档一次性吃透，RAG该退休了",source:"知乎",time:"2026-05-10"},
];
let sIdx=0,si;
function goSlide(n){
  sIdx=(n+SLIDES.length)%SLIDES.length;
  document.getElementById('sTrack').style.transform='translateX(-'+(sIdx*100)+'%)';
  document.querySelectorAll('.s-dot').forEach((d,i)=>d.classList.toggle('active',i===sIdx));
  clearInterval(si);si=setInterval(()=>goSlide(sIdx+1),3000);
}
function renderSlides(){
  const track=document.getElementById('sTrack'),dots=document.getElementById('sDots');
  SLIDES.forEach((s,i)=>{
    const d=document.createElement('div');d.className='slide';
    d.innerHTML='<img src="'+s.img+'" alt="'+s.tool+'" onerror="this.src='https://images.unsplash.com/photo-1677442136019-21780ecad995?w=1200&q=80'"><div class="slide-overlay"></div><div class="slide-content"><div class="slide-tag">'+s.tag+'</div><div class="slide-title">'+s.title+'</div><div class="slide-meta"><span>📰 '+s.source+'</span><span class="slide-dot"></span><span>'+s.time+'</span></div><button class="slide-link-btn">阅读评测 →</button></div>';
    track.appendChild(d);
    const dot=document.createElement('div');dot.className='s-dot'+(i===0?' active':'');
    dot.onclick=()=>goSlide(i);dots.appendChild(dot);
  });
}
document.getElementById('sPrev').onclick=()=>goSlide(sIdx-1);
document.getElementById('sNext').onclick=()=>goSlide(sIdx+1);
renderSlides();si=setInterval(()=>goSlide(sIdx+1),3000);

let tools=[],curCat='all',q='';
const CM={'全部':'all','聊天AI':'chat','图像生成':'image','代码助手':'code','视频制作':'video','音频工具':'audio','办公效率':'office','搜索研究':'search','3D建模':'3d','设计工具':'design','写作助手':'writing','大模型API':'api','开发者工具':'dev','教育学习':'education','AI物联网硬件':'aiiot','其他':'other'};
async function load(){
  try{
    const r=await fetch('tools.json');
    const d=await r.json();
    tools=d.tools.map(t=>{const m=CM[t.category]||{key:'other'};return{id:t.id,name:t.name,nameCn:t.nameCn||t.name,icon:t.icon||'◈',cat:m.key||'other',catLabel:t.category||'其他',desc:t.description||'',url:t.url||'#'}});
    document.getElementById('toolNum').textContent=tools.length;
    renderCards(tools.slice(0,20));
  }catch(e){console.error(e)}
}
function renderCards(ts){
  const panel=document.getElementById('rPanel');
  panel.innerHTML='<div class="rp-title">🔥 推荐工具</div>';
  ts.forEach(t=>{
    const c=document.createElement('div');c.className='mini-card';
    c.onclick=()=>location.href='tool-detail.html?id='+t.id;
    c.innerHTML='<div class="mini-icon"><img src="icons/'+t.id+'.png" onerror="this.style.display='none';this.parentElement.innerHTML=''+t.icon+''"></div><div class="mini-info"><div class="mini-name">'+t.nameCn+'</div><div class="mini-cat">'+t.catLabel+'</div></div><div class="mini-arrow">→</div><div class="mini-tip">'+t.desc.substring(0,80)+(t.desc.length>80?'...':'')+'</div>';
    panel.appendChild(c);
  });
}
document.getElementById('navCats').onclick=e=>{
  if(!e.target.classList.contains('nav-cat'))return;
  curCat=e.target.dataset.cat;
  document.querySelectorAll('.nav-cat').forEach(b=>b.classList.toggle('active',b===e.target));
  applyF();
};
document.getElementById('navSearch').oninput=e=>{q=e.target.value.trim().toLowerCase();applyF()};
function applyF(){
  let f=tools;
  if(q){f=tools.filter(t=>t.name.toLowerCase().includes(q)||t.nameCn.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.catLabel.toLowerCase().includes(q))}
  else if(curCat!=='all'){f=tools.filter(t=>t.cat===curCat)}
  renderCards(f.slice(0,20));
}
load();
</script>
</body>
</html>
