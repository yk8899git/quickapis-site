<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickAPIs - AI工具与智能硬件导航</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --sw-accent:#f97316;--sw-accent2:#f43f5e;--sw-bg:#faf9f7;--sw-card:#fff;
  --sw-border:rgba(0,0,0,.07);--sw-text:#1c1917;--sw-muted:#78716c;
  --hw-accent:#10b981;--hw-accent2:#06b6d4;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--sw-bg);color:var(--sw-text);min-height:100vh}

/* Nav */
.nav{background:#fff;border-bottom:1px solid var(--sw-border);padding:0 24px}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--sw-accent),var(--sw-accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-search{flex:1;max-width:360px;margin:0 32px;position:relative}
.nav-search input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--sw-border);border-radius:10px;font-size:14px;background:#f5f4f2;outline:none}
.nav-search input:focus{border-color:var(--sw-accent)}
.nav-search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.nav-count{font-size:12px;color:var(--sw-muted)}

/* Tabs */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--sw-border);background:#fff;padding:0 24px}
.tab-btn{padding:12px 28px;font-size:15px;font-weight:700;color:var(--sw-muted);border:none;background:none;cursor:pointer;position:relative;transition:.2s}
.tab-btn:hover{color:var(--sw-text)}
.tab-btn.sw-active{color:var(--sw-accent)}
.tab-btn.sw-active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sw-accent),var(--sw-accent2));border-radius:3px 3px 0 0}
.tab-btn.hw-active{color:var(--hw-accent)}
.tab-btn.hw-active::after{background:linear-gradient(90deg,var(--hw-accent),var(--hw-accent2))}

/* Sub nav */
.sub-nav{display:flex;gap:6px;padding:10px 24px;overflow-x:auto;background:#fff;flex-wrap:wrap}
.sub-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;color:var(--sw-muted);border:1.5px solid var(--sw-border);background:none;cursor:pointer;white-space:nowrap;transition:.15s}
.sub-btn:hover{border-color:var(--sw-accent);color:var(--sw-accent)}
.sub-btn.sw-on{background:var(--sw-accent);color:#fff;border-color:var(--sw-accent)}
.sub-btn.hw-on{background:var(--hw-accent);color:#fff;border-color:var(--hw-accent)}

/* Main */
.main-wrap{max-width:1400px;margin:0 auto;padding:20px 24px}

/* Slider */
.slider-wrap{position:relative;border-radius:18px;overflow:hidden;background:#1a1a2e;aspect-ratio:16/7;min-height:320px}
.slider-track{display:flex;height:100%;transition:transform .5s ease}
.slide{min-width:100%;height:100%;position:relative;display:flex;align-items:flex-end}
.slide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,rgba(0,0,0,.08) 50%,transparent 100%);z-index:1}
.slide-content{position:relative;z-index:2;padding:36px 36px 30px;color:#fff;width:100%}
.slide-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(16,185,129,.85);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:10px}
.slide-title{font-size:22px;font-weight:800;line-height:1.35;max-width:600px;margin-bottom:10px}
.slide-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.75);margin-bottom:14px}
.slide-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.5)}
.slide-link{display:inline-block;padding:9px 20px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);border-radius:10px;color:#fff;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;transition:.2s}
.slide-link:hover{background:rgba(255,255,255,.25)}
.s-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.s-arrow:hover{background:rgba(0,0,0,.65)}
.s-prev{left:12px}.s-next{right:12px}
.slider-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:7px}
.s-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.35);cursor:pointer;transition:.2s}
.s-dot.on{background:#fff;width:22px;border-radius:4px}

.nav-links{display:flex;align-items:center;gap:4px;flex-shrink:0}
.nav-link{display:inline-block;padding:6px 12px;border-radius:8px;font-size:13px;color:var(--sw-text);text-decoration:none;transition:.2s}
.nav-link:hover{background:var(--sw-border);color:var(--sw-accent)}
.nav-link.active{background:linear-gradient(135deg,var(--sw-accent),var(--sw-accent2));color:#fff;font-weight:700}
.grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:20px}
.grid-title{font-size:17px;font-weight:800}
.grid-count{font-size:13px;color:var(--sw-muted)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--sw-card);border:1px solid var(--sw-border);border-radius:14px;padding:16px;cursor:pointer;transition:.2s;display:flex;gap:14px;align-items:flex-start}
.card:hover{border-color:rgba(249,115,22,.25);box-shadow:0 4px 16px rgba(249,115,22,.07);transform:translateX(3px)}
.card.hw:hover{border-color:rgba(16,185,129,.25);box-shadow:0 4px 16px rgba(16,185,129,.07)}
.card-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:linear-gradient(135deg,var(--sw-accent),var(--sw-accent2));color:#fff}
.card-icon.hw{background:linear-gradient(135deg,var(--hw-accent),var(--hw-accent2))}
.card-body{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;margin-bottom:3px}
.card-cat{font-size:11px;color:var(--sw-muted);margin-bottom:5px}
.card-desc{font-size:12px;color:var(--sw-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-img{width:100%;height:90px;border-radius:8px;margin-top:10px;object-fit:cover;background:#f0ede8}

/* Footer */
.footer{border-top:1px solid var(--sw-border);padding:28px 0;margin-top:40px;text-align:center}
.footer-logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--sw-accent),var(--sw-accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.footer-copy{font-size:12px;color:var(--sw-muted);margin-top:10px}

@media(max-width:640px){
  .nav-inner{flex-direction:column;height:auto;padding:12px 0;gap:8px}
  .nav-search{margin:0;width:100%}
  .tab-bar{overflow-x:auto}
  .tools-grid{grid-template-columns:1fr}
  .slide-title{font-size:17px}
  .card{flex-direction:column}
}
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">QuickAPIs</a>
    <div class="nav-search">
      <input id="searchInput" placeholder="搜索AI工具/硬件..." autocomplete="off">
    </div>
    <div class="nav-count">收录 <span id="toolNum">-</span> 款 · 👁 <span id="busuanzi_value_site_uv">-</span> · 🔢 <span id="busuanzi_value_site_pv">-</span></div>
    <div class="nav-links">
      <a class="nav-link" href="/" onclick="renderAll();return false;">🏠 首页</a>
      <a class="nav-link active" href="#" id="navAIZhibo">🎙️ AI直播</a>
      <a class="nav-link" href="admin.html">🔧 后台</a>
    </div>
  </div>
</nav>

<!-- ===== TABS ===== -->
<div class="tab-bar" id="tabBar"></div>

<!-- ===== SUB NAV ===== -->
<div class="sub-nav" id="subNav"></div>

<!-- ===== MAIN ===== -->
<main class="main-wrap">

<!-- Slider -->
<div class="slider-wrap" id="sliderWrap">
  <div class="slider-track" id="sliderTrack"></div>
  <button class="s-arrow s-prev" id="sPrev">‹</button>
  <button class="s-arrow s-next" id="sNext">›</button>
  <div class="slider-dots" id="sliderDots"></div>
</div>

<!-- Grid -->
<div class="grid-header" id="gridHeader" style="display:none">
  <div class="grid-title" id="gridTitle">全部</div>
  <div class="grid-count" id="gridCount">共 0 个</div>
</div>
<div class="tools-grid" id="toolsGrid"></div>

</main>

<footer class="footer">
  <div class="footer-logo">QuickAPIs</div>
  <div class="footer-copy">&copy; 2026 QuickAPIs.top &middot; 国内合规AI产品导航 <span id="busuanzi_container_site_pv" style="display:inline"><span id="busuanzi_value_site_pv">--</span> 次访问</span></div>
</footer>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<script>
// ========== DATA ==========
const SW_CATS = [
  {key:'对话大模型',emoji:'💬',label:'对话大模型'},
  {key:'大模型API',emoji:'🔌',label:'大模型API'},
  {key:'图像生成',emoji:'🎨',label:'图像生成'},
  {key:'视频制作',emoji:'🎬',label:'视频制作'},
  {key:'音频工具',emoji:'🎵',label:'音频工具'},
  {key:'办公效率',emoji:'💼',label:'办公效率'},
  {key:'写作助手',emoji:'✍️',label:'写作助手'},
  {key:'搜索研究',emoji:'🔍',label:'搜索研究'},
  {key:'开发者工具',emoji:'🛠️',label:'开发者工具'},
  {key:'设计工具',emoji:'📐',label:'设计工具'},
  {key:'教育学习',emoji:'📚',label:'教育学习'},
];
const HW_CATS = [
  {key:'智能家居',emoji:'🏠',label:'智能家居'},
  {key:'人形机器人',emoji:'🤖',label:'人形机器人'},
  {key:'扫地机器人',emoji:'🧹',label:'扫地机器人'},
  {key:'AI眼镜',emoji:'👓',label:'AI眼镜'},
  {key:'智能音箱',emoji:'🔊',label:'智能音箱'},
  {key:'AI学习机',emoji:'📚',label:'AI学习机'},
  {key:'无人机',emoji:'🛩️',label:'无人机'},
  {key:'翻译录音',emoji:'🗣️',label:'翻译录音'},
  {key:'智能摄像',emoji:'📷',label:'智能摄像'},
  {key:'服务机器人',emoji:'🤝',label:'服务机器人'},
  {key:'工业机器人',emoji:'🏭',label:'工业机器人'},
  {key:'AI健康穿戴',emoji:'⌚',label:'AI健康穿戴'},
];

const HW_CAT_SET = new Set(HW_CATS.map(c=>c.key));

const SLIDES = [
  {id:'unitree-go2', img:'images/slides/slide-unitree-go2.png', bg:'#0c0c1d', tag:'🤖 宇树Go2', title:'宇树四足机器人Go2：AI大模型+超感知，工业巡检到家庭陪伴', source:'宇树科技 · 2026'},
  {id:'gpt-4o-image', img:'images/slides/slide-gpt-4o-image.png', bg:'#1a1a2e', tag:'🎨 GPT-4o图像生成', title:'GPT-4o原生图像生成：文字渲染精准、风格一致、多轮编辑', source:'OpenAI · 2025.04'},
  {id:'gemini-2-5-pro', img:'images/slides/slide-gemini-2-5-pro.png', bg:'#1e3a5f', tag:'💬 Gemini 2.5 Pro', title:'Gemini 2.5 Pro：百万token上下文+深度推理，编程能力登顶', source:'Google · 2025.05'},
  {id:'roborock-saros-z70', img:'images/slides/slide-roborock-saros-z70.png', bg:'#1a2a1a', tag:'🧹 石头Saros Z70', title:'石头Saros Z70：仿生机械手扫地机器人，CES2025爆款', source:'石头科技'},
  {id:'claude-4-sonnet', img:'images/slides/slide-claude-4-sonnet.png', bg:'#2d1b4e', tag:'💬 Claude 4 Sonnet', title:'Claude 4 Sonnet：Anthropic最新旗舰，代码能力超越GPT-4o', source:'Anthropic · 2025.05'},
  {id:'raybird-v3', img:'images/slides/slide-raybird-v3.png', bg:'#1e1b4b', tag:'👓 雷鸟V3', title:'雷鸟V3 AI眼镜：通义大模型加持，15小时续航，1600万拍摄', source:'雷鸟创新'},
  {id:'xiaopeng-iron', img:'images/slides/slide-xiaopeng-iron.png', bg:'#1c1917', tag:'🤖 小鹏Iron', title:'小鹏Iron人形机器人：62自由度+AI鹰眼视觉，2026年量产', source:'小鹏鹏行'},
  {id:'kimi-k1-5', img:'images/slides/slide-kimi-k1-5.png', bg:'#0f172a', tag:'💬 Kimi K1.5', title:'Kimi K1.5：长文本推理增强版，200万字上下文无损压缩', source:'月之暗面 · 2025.05'},
  {id:'ecovacs-x9', img:'images/slides/slide-ecovacs-x9.jpg', bg:'#172554', tag:'🧹 科沃斯X9', title:'科沃斯X9：AIVI 3D避障+双滚刷，8800Pa旗舰扫地机', source:'科沃斯'},
  {id:'dji-mini4pro', img:'images/slides/slide-dji-mini4pro.jpg', bg:'#0c4a6e', tag:'🛩️ 大疆Mini 4 Pro', title:'大疆Mini 4 Pro：4K HDR航拍+全向避障，249g轻型无人机', source:'大疆创新'},
];

// ========== STATE ==========
let tools = [];
let curTab = 'software';
let curCat = 'all';
let searchQ = '';
let slideIdx = 0;
let slideTimer = null;

// ========== UTIL ==========
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ========== LOAD TOOLS ==========
async function loadTools() {
  try {
    const r = await fetch('./tools.json?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    let raw = await r.text();
    if (raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
    const d = JSON.parse(raw);
    tools = d.tools || [];
    document.getElementById('toolNum').textContent = tools.length;
    initUI();
  } catch(e) {
    console.error('Load tools failed:', e);
  }
}

// ========== INIT UI ==========
function initUI() {
  renderTabs();
  renderSubNav();
  renderSlides();
  applyFilter();

  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    searchQ = this.value.trim().toLowerCase();
    applyFilter();
  });
}

// ========== TABS ==========
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = `
    <button class="tab-btn sw-active" data-tab="software" onclick="switchTab('software')">🤖 AI软体工具集</button>
    <button class="tab-btn" data-tab="hardware" onclick="switchTab('hardware')">🔌 AI硬件万物物联</button>
  `;
}

function switchTab(tab) {
  curTab = tab;
  curCat = 'all';
  searchQ = '';
  document.getElementById('searchInput').value = '';

  // Update tab styles
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    const isSw = b.dataset.tab === 'software';
    b.classList.remove('sw-active','hw-active');
    if (b.dataset.tab === tab) {
      b.classList.add(isSw ? 'sw-active' : 'hw-active');
    }
  });

  renderSubNav();
  applyFilter();
}

// ========== SUB NAV ==========
function renderSubNav() {
  const nav = document.getElementById('subNav');
  const cats = curTab === 'software' ? SW_CATS : HW_CATS;
  const cls = curTab === 'software' ? 'sw' : 'hw';

  let html = '<button class="sub-btn '+cls+'-on" data-cat="all" onclick="pickCat(\'all\',this)">全部</button>';
  cats.forEach(function(c) {
    html += '<button class="sub-btn" data-cat="'+esc(c.key)+'" onclick="pickCat(\''+esc(c.key)+'\',this)">'+c.emoji+' '+esc(c.label)+'</button>';
  });
  nav.innerHTML = html;
}

function pickCat(cat, btnEl) {
  curCat = cat;
  const cls = curTab === 'software' ? 'sw' : 'hw';
  btnEl.parentElement.querySelectorAll('.sub-btn').forEach(function(b) {
    b.classList.remove('sw-on','hw-on');
  });
  btnEl.classList.add(cls + '-on');
  applyFilter();
  document.getElementById('toolsGrid').scrollIntoView({behavior:'smooth',block:'start'});
}

// ========== FILTER + RENDER ==========
function applyFilter() {
  let list = tools.filter(function(t) {
    const isHW = HW_CAT_SET.has(t.category);
    return curTab === 'software' ? !isHW : isHW;
  });

  if (curCat !== 'all') {
    list = list.filter(function(t) { return t.category === curCat; });
  }

  if (searchQ) {
    const q = searchQ;
    list = list.filter(function(t) {
      const text = (t.name||'') + (t.nameCn||'') + (t.description||'') + (t.category||'');
      return text.toLowerCase().indexOf(q) !== -1;
    });
  }

  renderGrid(list);
}

function renderGrid(list) {
  const grid = document.getElementById('toolsGrid');
  const header = document.getElementById('gridHeader');
  const isHW = curTab === 'hardware';

  if (list.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--sw-muted);font-size:15px;">暂无匹配的产品</div';
    header.style.display = 'none';
    return;
  }

  header.style.display = 'flex';

  let catName = curCat === 'all' ? (isHW ? '全部硬件' : '全部工具') : curCat;
  document.getElementById('gridTitle').textContent = catName;
  document.getElementById('gridCount').textContent = '共 ' + list.length + ' 个';

  let html = '';
  list.forEach(function(t) {
    const link = t.url || t.website || t.link || '#';
    const bannerImg = t.bannerImage ? '<img class="card-img" src="'+esc(t.bannerImage)+'" onerror="this.style.display=\'none\'">' : '';

    html += '<div class="card'+(isHW?' hw':'')+'" onclick="location.href=\'tool-detail.html?id='+esc(t.id)+'\'">';
    html +=   '<div class="card-icon'+(isHW?' hw':'')+'">'+esc(t.icon||'◈')+'</div>';
    html +=   '<div class="card-body">';
    html +=     '<div class="card-name">'+esc(t.nameCn||t.name)+'</div>';
    html +=     '<div class="card-cat">'+esc(t.category)+'</div>';
    html +=     bannerImg;
    html +=     '<div class="card-desc">'+esc((t.description||'').substring(0,100))+'</div>';
    html +=   '</div>';
    html += '</div>';
  });
  grid.innerHTML = html;
}

// ========== SLIDER ==========
function renderSlides() {
  const track = document.getElementById('sliderTrack');
  const dots = document.getElementById('sliderDots');

  SLIDES.forEach(function(s, i) {
    // Slide div
    var d = document.createElement('div');
    d.className = 'slide';

    var imgEl = document.createElement('img');
    imgEl.src = s.img;
    imgEl.alt = s.title;
    imgEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    d.style.background = s.bg;
    d.appendChild(imgEl);
    d.innerHTML += '<div class="slide-overlay"></div><div class="slide-content"><div class="slide-tag">'+esc(s.tag)+'</div><div class="slide-title">'+esc(s.title)+'</div><div class="slide-meta"><span>📰 '+esc(s.source)+'</span><span class="slide-dot"></span><span>2026</span></div><a class="slide-link" href="tool-detail.html?id='+esc(s.id)+'">查看详情 →</a></div>';

    track.appendChild(d);

    // Dot
    var dot = document.createElement('div');
    dot.className = 's-dot' + (i===0 ? ' on' : '');
    dot.onclick = function() { goSlide(i); };
    dots.appendChild(dot);
  });

  document.getElementById('sPrev').onclick = function() { goSlide(slideIdx - 1); };
  document.getElementById('sNext').onclick = function() { goSlide(slideIdx + 1); };

  startAutoPlay();
}

function goSlide(n) {
  slideIdx = (n + SLIDES.length) % SLIDES.length;
  document.getElementById('sliderTrack').style.transform = 'translateX(-' + (slideIdx * 100) + '%)';
  document.querySelectorAll('.s-dot').forEach(function(d, i) {
    d.classList.toggle('on', i === slideIdx);
  });
  clearInterval(slideTimer);
  startAutoPlay();
}

function startAutoPlay() {
  slideTimer = setInterval(function() { goSlide(slideIdx + 1); }, 4500);
}

// ========== AI直播 导航 ==========
document.getElementById('navAIZhibo').addEventListener('click', function(e){
  e.preventDefault();
  showLivePage();
});

function showLivePage(){
  document.getElementById('sliderWrap').style.display='none';
  document.getElementById('gridHeader').style.display='none';
  document.getElementById('subNav').style.display='none';
  var main=document.querySelector('.main-wrap');
  // 移除旧的iframe
  var old=document.getElementById('liveIframeWrap');
  if(old) old.remove();
  // 创建iframe
  var wrap=document.createElement('div');
  wrap.id='liveIframeWrap';
